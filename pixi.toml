[workspace]
authors = ["ehsanmok <ehsanmok@users.noreply.github.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "uuid"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"
preview = ["pixi-build"]

[package]
name = "uuid"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "*" }

[dependencies]
uuid = { path = "." }
# Exclude broken Mojo nightlies that crash at process start on Linux
# (`libKGENCompilerRTShared+0x6de3b`/`+0x6dc0b` -> libc sigaction) for
# uuid's test_core.mojo.  Upper bound excludes the first affected nightly;
# downstream consumers stay free to move forward as soon as a fixed
# nightly lands.
mojo = "<0.26.3.0.dev2026042005"

[target.linux-64.dependencies]
# Pin sysroot to 2.34 -- newer sysroots (2.39+) have been observed to crash
# Mojo's JIT runtime (`libKGENCompilerRTShared` abort during process init)
# on GitHub's ubuntu-latest runners.
sysroot_linux-64 = "2.34.*"

[feature.dev.dependencies]
pre-commit = ">=4.2.0,<5"
mojodoc = { git = "https://github.com/ehsanmok/mojodoc.git", branch = "main" }

[environments]
default = { features = ["dev"], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[tasks]
# Format
install-pre-commit = "pre-commit install"
format = { cmd = "mojo format uuid tests examples benchmark", depends-on = ["install-pre-commit"] }

# Tests
tests = "mojo -I . tests/test_core.mojo && mojo -I . tests/test_v4.mojo && mojo -I . tests/test_v7.mojo && mojo -I . tests/test_simd_hex.mojo"
test-core = "mojo -I . tests/test_core.mojo"
test-v4 = "mojo -I . tests/test_v4.mojo"
test-v7 = "mojo -I . tests/test_v7.mojo"
test-simd-hex = "mojo -I . tests/test_simd_hex.mojo"

# Examples
example = "mojo -I . examples/example.mojo"

# Benchmark
bench = "mojo -I . benchmark/bench.mojo"

# Docs
docs = "mojodoc ./uuid --open"
docs-build = "mojodoc ./uuid --out-dir target/doc --base-url /uuid/"

